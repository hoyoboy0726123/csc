<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工單管理系統</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="{{ url_for('index') }}">首頁</a></li>
                <li><a href="{{ url_for('work_order_list') }}">工單列表</a></li>
                <li><a href="{{ url_for('work_order_create') }}">新增工單</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>工單管理系統</h1>
        <section>
            <h2>工單列表</h2>
            <table>
                <thead>
                    <tr>
                        <th>工單編號</th>
                        <th>客戶名稱</th>
                        <th>產品編號</th>
                        <th>狀態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for work_order in work_orders %}
                    <tr>
                        <td>{{ work_order.id }}</td>
                        <td>{{ work_order.customer_name }}</td>
                        <td>{{ work_order.product_id }}</td>
                        <td>{{ work_order.status }}</td>
                        <td>
                            <a href="{{ url_for('work_order_detail', id=work_order.id) }}">查看</a>
                            <a href="{{ url_for('work_order_edit', id=work_order.id) }}">編輯</a>
                            <a href="{{ url_for('work_order_delete', id=work_order.id) }}">刪除</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 工單管理系統</p>
    </footer>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>

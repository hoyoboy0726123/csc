version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: v2c-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./whisper:/app/whisper
      - ./tests:/app/tests
      - ./docs:/app/docs
      - ./backend/static:/app/backend/static
      - ./backend/database:/app/backend/database
    environment:
      - PYTHONPATH=/app
      - ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-/app/backend/database/v2c.db}
      - ZIP_CACHE_DIR=${ZIP_CACHE_DIR:-/app/backend/static/zips}
      - WHISPER_SERVICE_URL=http://whisper:9000
    depends_on:
      - whisper
    networks:
      - v2c-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: v2c-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    networks:
      - v2c-net
    restart: unless-stopped

  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile.whisper
    container_name: v2c-whisper
    ports:
      - "9000:9000"
    volumes:
      - ./whisper:/app
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-float16}
    networks:
      - v2c-net
    restart: unless-stopped

networks:
  v2c-net:
    driver: bridge